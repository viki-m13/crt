name: spx-daily

# SPX/SPY directional signal — nightly.
#
# Fetches the full SPY daily history from the Yahoo chart endpoint,
# runs the two-book call/put spread signal (frozen params, 200-day
# regime filter, GTC limit exits), and publishes spx/docs/data/signal.json
# for the /spx/ page. Runs hourly 21-23 UTC Mon-Fri behind a 5pm-NY gate
# (same pattern as creditfloor-daily), giving retry windows if a run fails.

on:
  schedule:
    - cron: "45 21,22,23 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass the 5pm-NY gate and run immediately"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: spx-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy requests yfinance pandas

      - name: Gate — only run after 5pm America/New_York
        id: gate
        run: |
          set -e
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          forced = os.environ.get("FORCE_RUN") == "1"
          ny = datetime.now(ZoneInfo("America/New_York"))
          skip = (not forced) and ny.hour < 17
          skip = skip or (ny.weekday() >= 5 and not forced)
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"skip={'true' if skip else 'false'}\n")
          print(f"NY time: {ny.isoformat()}  weekday={ny.weekday()}  forced={forced}  skip={skip}")
          PY
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: Refresh SPY panel
        if: steps.gate.outputs.skip != 'true'
        run: python strategies/spx_predict/fetch_spy.py

      - name: Run SPX directional signal
        if: steps.gate.outputs.skip != 'true'
        run: python strategies/spx_predict/signal.py

      - name: Validate model vs live SPY/SPX option prices
        # Compares the v2 model's spread credit and leg IVs against real
        # quoted chains (mid + natural fills). Fail-soft: a Yahoo outage
        # must never block the signal publication.
        if: steps.gate.outputs.skip != 'true'
        continue-on-error: true
        run: python strategies/spx_predict/validate_live.py

      - name: Commit & push
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spx/docs/data/signal.json spx/docs/data/live_validation.json \
                  strategies/spx_predict/data/SPY.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          TS=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "SPX daily signal ${TS}"
          for attempt in 1 2 3 4; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" \
               && git push origin HEAD:"${GITHUB_REF_NAME}"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            sleep $((2 ** attempt))
          done
          echo "Push failed after 4 attempts." >&2
          exit 1

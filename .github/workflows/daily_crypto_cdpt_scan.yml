name: Daily Crypto CDPT Scan

on:
  workflow_dispatch: {}
  schedule:
    # Run at 6:00pm ET (23:00 UTC) — 30 min after TMD-ARC stock scan
    - cron: "0 23 * * *"

permissions:
  contents: write

concurrency:
  group: daily-crypto-cdpt-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: experiments/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r experiments/requirements.txt

      - name: Run Crypto CDPT scan
        run: |
          mkdir -p experiments/crypto/docs/data/tickers
          cd experiments/crypto
          python scripts/daily_scan.py

      - name: Commit updated crypto data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add experiments/crypto/docs/data
          git diff --cached --quiet || git commit -m "Daily Crypto CDPT scan"
          git push

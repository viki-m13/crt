name: Daily TMD-ARC Scan

on:
  workflow_dispatch: {}
  schedule:
    # Run at 5:30pm ET (22:30 UTC) — 30 min after main scan
    - cron: "30 22 * * *"

permissions:
  contents: write

concurrency:
  group: daily-tmdarc-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: experiments/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r experiments/requirements.txt

      - name: Run TMD-ARC scan
        run: |
          mkdir -p experiments/docs/data/tickers
          cd experiments
          python scripts/daily_scan.py

      - name: Commit updated experiment data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add experiments/docs/data
          git diff --cached --quiet || git commit -m "Daily TMD-ARC scan"
          git push

name: monthly-dca-cron

# Monthly-DCA v5 PIT S&P 500 webapp refresh.
#
# The strategy rebalances every 6 months on a month-end. Between
# rebalances the basket is held; only prices, the inv-vol weights and
# next/prev-rebalance dates need to be refreshed. A monthly cadence is
# sufficient: it runs the day after each month-end so the panel
# captures the full month's closes and (when due) advances the
# rebalance.
#
# Underlying orchestrator: experiments/monthly_dca/cron_daily_refresh.py
# which delegates to experiments/monthly_dca/v5/cron_daily_refresh_v5.py.
# That pipeline is fully idempotent:
#   1) Refresh IVV holdings (current S&P 500 universe)
#   2) Backfill yfinance prices for any new constituents
#   3) Rebuild monthly features / PIT membership
#   4) Score Chronos-bolt-tiny incrementally (skip if asof already
#      present in ml_preds_chronos.parquet)
#   5) Run the v5 simulator and emit experiments/docs/monthly-dca/data.json
#
# Manual dispatch is supported for backfilling after code changes.

on:
  schedule:
    # 18:00 UTC on the 1st of each month.
    - cron: "0 18 1 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monthly-dca-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --quiet pyarrow pandas numpy yfinance torch chronos-forecasting

      - name: Refresh monthly-DCA webapp data
        # Full pipeline: IVV universe refresh, prices, features, PIT
        # membership, Chronos incremental scoring, simulator,
        # experiments/docs/monthly-dca/data.json.
        run: |
          set -e
          python experiments/monthly_dca/cron_daily_refresh.py

      - name: Commit & push updates
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            experiments/docs/monthly-dca/data.json \
            experiments/monthly_dca/cache/prices.parquet \
            experiments/monthly_dca/cache/meta.parquet \
            experiments/monthly_dca/cache/survivorship_summary.json \
            experiments/monthly_dca/cache/delisted_panel.parquet \
            experiments/monthly_dca/v5/ivv_holdings_latest.csv \
            experiments/monthly_dca/v5/ml_preds_chronos.parquet \
            "experiments/monthly_dca/cache/features/" \
            "docs/data/tickers/" || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          TS=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "monthly-DCA v5 refresh ${TS}"
          for attempt in 1 2 3 4; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" \
               && git push origin HEAD:"${GITHUB_REF_NAME}"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            sleep $((2 ** attempt))
          done
          echo "Push failed after 4 attempts." >&2
          exit 1

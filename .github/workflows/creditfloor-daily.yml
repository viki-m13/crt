name: creditfloor-daily

# CreditFloor daily cron.
#
# Runs hourly from 21:00 to 23:55 UTC Mon-Fri. The underlying
# scripts/daily_scan.py gate requires >= 5pm America/New_York and
# will only run once per day; the hourly cadence gives ~3-4 retry
# windows per weekday if a run fails. This covers:
#   - 5pm EST  = 22:00 UTC  (winter)
#   - 5pm EDT  = 21:00 UTC  (summer)
# and a 2-hour buffer after close in both.
#
# Backfill semantics: daily_scan.py fetches yfinance with period="max"
# every run, so if the workflow missed a day (weekend, holiday, action
# failure) the next successful run reconstructs the series through the
# latest trading day automatically. The CreditFloor scan then re-runs
# on the refreshed series.

on:
  schedule:
    # Minute 15 past each hour 21-23 UTC, Mon-Fri.
    - cron: "15 21,22,23 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass the 5pm-NY gate and run immediately"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: creditfloor-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r strategies/credit_spread/requirements.txt

      - name: Gate — only run after 5pm America/New_York
        id: gate
        run: |
          set -e
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          forced = os.environ.get("FORCE_RUN") == "1"
          ny = datetime.now(ZoneInfo("America/New_York"))
          skip = (not forced) and ny.hour < 17
          # Saturday/Sunday: no new data, skip unless forced
          is_weekend = ny.weekday() >= 5
          skip = skip or (is_weekend and not forced)
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"skip={'true' if skip else 'false'}\n")
          print(f"NY time: {ny.isoformat()}  weekday={ny.weekday()}  forced={forced}  skip={skip}")
          PY
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: Run CreditFloor v3 scan
        # scan.py refreshes the full-history price panel from yfinance
        # (period=max, single consistent adjustment basis — no
        # split/dividend seams), refreshes the listed-options map
        # weekly, runs the v3 Sigma-Clear research, publishes
        # spreads/docs/data/signals.json and updates the append-only
        # live log.
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -e
          python strategies/credit_spread/scan.py

      - name: Run Option C event-triggered spread scan
        # Separate engine: triggered by touch-prediction regimes.
        # Fetches fresh OHLCV for liquid universe + publishes
        # spreads/docs/data/option_c_signals.json.
        # PAUSED: remove `false &&` below to re-enable.
        if: false && steps.gate.outputs.skip != 'true'
        run: |
          set -e
          python strategies/touch_predict/option_c_scan.py

      - name: Run Stillpoint compression-conditioned scan
        # Third engine: tight strikes (<=5%), short DTE (<21d),
        # conformal q-quantile under stillness regime gate.
        # Reuses docs/data/tickers/*.json refreshed by the backfill
        # step; publishes spreads/docs/data/stillpoint_signals.json.
        # PAUSED: remove `false &&` below to re-enable.
        if: false && steps.gate.outputs.skip != 'true'
        run: |
          set -e
          python strategies/stillpoint/scan.py

      - name: Update Stillpoint live log
        # Append every newly-published Stillpoint signal (Atomic IC,
        # Universal IC, Robust UIC) to the immutable live log AND
        # resolve any pending signals whose expiry has now passed.
        # This is the survivorship-bias-free scoreboard for live WR.
        # PAUSED: remove `false &&` below to re-enable.
        if: false && steps.gate.outputs.skip != 'true'
        run: |
          set -e
          python strategies/stillpoint/live_log.py

      - name: Refresh monthly-DCA webapp data
        # Pullback-In-Winner monthly DCA strategy webapp at
        # /experiments/monthly-dca/. This rebuilds the price panel
        # from the freshly-backfilled docs/data/tickers/*.json,
        # recomputes features for the most recent 3 month-ends
        # (current month grows intra-month), and emits the
        # experiments/docs/monthly-dca/data.json the page renders from.
        # ~30-60s, idempotent, fail-soft (catches & logs all errors so
        # this step never blocks the credit-spread / Stillpoint
        # commits above).
        # PAUSED: remove `false &&` below to re-enable.
        if: false && steps.gate.outputs.skip != 'true'
        continue-on-error: true
        run: |
          set -e
          # scikit-learn is REQUIRED: build_webapp_v5_pit imports the
          # v2 ml_strategy (HistGradientBoosting) at module load. Without
          # it the whole monthly-DCA refresh ImportErrors and (being
          # fail-soft) silently leaves data.json frozen.
          pip install --quiet pyarrow pandas numpy yfinance scikit-learn
          python experiments/monthly_dca/cron_daily_refresh.py

      - name: Summarize results
        if: steps.gate.outputs.skip != 'true'
        run: |
          python - <<'PY'
          import json, os
          p = 'spreads/docs/data/signals.json'
          if not os.path.exists(p):
              print('no signals.json; nothing produced')
              raise SystemExit(0)
          d = json.load(open(p))
          s = d.get('summary', {})
          combined = s.get('combined', {})
          put  = s.get('put', {})
          call = s.get('call', {})
          print(f"put:       certified={put.get('n_certified')} published={put.get('n_published')} tests={put.get('pooled_wins',0)+put.get('pooled_losses',0)} losses={put.get('pooled_losses',0)}")
          print(f"call:      certified={call.get('n_certified')} published={call.get('n_published')} tests={call.get('pooled_wins',0)+call.get('pooled_losses',0)} losses={call.get('pooled_losses',0)}")
          print(f"combined:  certified={combined.get('n_certified')} published={combined.get('n_published')} tests={combined.get('pooled_wins',0)+combined.get('pooled_losses',0)} losses={combined.get('pooled_losses',0)}")
          t2 = s.get('tier2') or {}
          print(f"tier2:     scored={t2.get('n_scored')} above_thr={t2.get('n_above_threshold')} published={t2.get('n_published')}")
          print(f"engine:        {d.get('engine')}")
          print(f"generated_at:  {d.get('generated_at')}")
          # Fail-closed on backtest
          if put.get('pooled_losses', 0) or call.get('pooled_losses', 0):
              raise SystemExit("FAIL: pooled losses > 0 on some side — backtest fail-closed invariant broken")

          # Report the live log too (does NOT fail the workflow on a
          # live loss — those are real and must be surfaced, not hidden
          # behind a red CI badge).
          lp = 'spreads/docs/data/live_log.json'
          if os.path.exists(lp):
              live = json.load(open(lp))
              ls = live.get('summary', {})
              print(f"live:      total={ls.get('total')} resolved={ls.get('resolved')} pending={ls.get('pending')} wins={ls.get('wins')} losses={ls.get('losses')} win_rate={ls.get('win_rate')}")
              if (ls.get('losses') or 0) > 0:
                  print(f"LIVE LOSS ALERT: {ls.get('losses')} confirmed loss(es) in live log — visible in webapp.")
          PY

      - name: Commit & push updates
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Commit ONLY CreditFloor outputs. The backfill mutates
          # docs/data/tickers/*.json in-place but those are the main
          # scanner's artifacts and are separately maintained — we
          # leave them uncommitted so our workflow never collides with
          # the main scanner's commit cadence. The backfill re-runs
          # from whatever state is in git each invocation, which only
          # costs ~40s over 964 tickers.
          git add \
            spreads/docs/data/signals.json \
            spreads/docs/data/live_log.json \
            spreads/docs/data/last_run.txt \
            spreads/docs/data/option_c_signals.json \
            spreads/docs/data/option_c_certified_cells.json \
            spreads/docs/data/stillpoint_signals.json \
            spreads/docs/data/stillpoint_live_log.json \
            strategies/credit_spread/results/signals.json \
            strategies/credit_spread/results/optionable.json \
            strategies/touch_predict/results/option_c_signals.json \
            strategies/touch_predict/results/option_c_certified_cells.json \
            strategies/stillpoint/results/stillpoint_signals.json \
            experiments/docs/monthly-dca/data.json \
            experiments/monthly_dca/cache/prices.parquet \
            experiments/monthly_dca/cache/meta.parquet \
            experiments/monthly_dca/cache/survivorship_summary.json \
            experiments/monthly_dca/cache/delisted_panel.parquet \
            "experiments/monthly_dca/cache/features/" || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            # Discard the backfill's in-place ticker mutations so the
            # working tree is clean for the next job.
            git checkout -- docs/data/tickers 2>/dev/null || true
            exit 0
          fi
          TS=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "CreditFloor daily scan ${TS}"
          # Before pushing: discard the backfill's unstaged in-place
          # ticker mutations so `git pull --rebase` can run without
          # complaining about unstaged changes. We intentionally do NOT
          # commit those — tickers are regenerated from yfinance each
          # run anyway.
          git checkout -- docs/data/tickers 2>/dev/null || true
          # Retry push with exponential backoff on transient failures.
          # --autostash is a belt-and-suspenders: catches anything else
          # the runner leaves dirty (e.g. cached files in results/).
          for attempt in 1 2 3 4; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" \
               && git push origin HEAD:"${GITHUB_REF_NAME}"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            sleep $((2 ** attempt))
          done
          echo "Push failed after 4 attempts." >&2
          exit 1

name: Daily CCRL AI Picks Scan

on:
  workflow_dispatch: {}
  schedule:
    # Run at 6pm ET (23:00 UTC) — after market close
    - cron: "0 23 * * 1-5"

permissions:
  contents: write

concurrency:
  group: daily-ccrl-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: experiments/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r experiments/requirements.txt

      - name: Run CCRL scan
        run: |
          mkdir -p experiments/docs/data/tickers
          cd experiments
          python scripts/daily_ccrl_scan.py

      - name: Commit updated CCRL data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add experiments/docs/data
          git diff --cached --quiet || git commit -m "Daily CCRL AI picks scan"
          git push
